var pyodide=null,mode='demo',uploadedData=null,mdeChart=null,stratChart=null;

function setMode(m){
  mode=m;
  ['demo','upload'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active',t===m);
    document.getElementById('tab-'+t).setAttribute('aria-selected',t===m);
    document.getElementById('panel-'+t).hidden=t!==m;
  });
}

document.getElementById('csv-input').addEventListener('change',function(e){handleFile(e.target.files[0])});
var dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over')});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag-over');handleFile(e.dataTransfer.files[0])});

function handleFile(f){
  if(!f)return;
  document.getElementById('file-name').textContent=f.name;
  var r=new FileReader();
  r.onload=function(e){
    try{uploadedData=parseCSV(e.target.result);setStatus('ready','CSV loaded — '+uploadedData.n.toLocaleString()+' pts');}
    catch(err){setStatus('error','Parse error: '+err.message);}
  };
  r.readAsText(f);
}

function parseCSV(txt){
  var lines=txt.trim().split('\n');
  var hdr=lines[0].toLowerCase().split(',').map(function(s){return s.trim()});
  var xi=hdr.indexOf('x'),yi=hdr.indexOf('y'),zi=hdr.indexOf('z');
  var ti=hdr.indexOf('true_label'),pi=hdr.indexOf('pred_label');
  if([xi,yi,zi,ti,pi].some(function(i){return i<0})) throw new Error('Missing columns: x,y,z,true_label,pred_label');
  var x=[],y=[],z=[],tl=[],pl=[];
  for(var i=1;i<lines.length;i++){
    var p=lines[i].split(',');
    if(p.length<5)continue;
    x.push(parseFloat(p[xi]));y.push(parseFloat(p[yi]));z.push(parseFloat(p[zi]));
    tl.push(parseInt(p[ti]));pl.push(parseInt(p[pi]));
  }
  return{x:x,y:y,z:z,tl:tl,pl:pl,n:x.length};
}

function setStatus(state,txt){
  var pill=document.getElementById('status-pill');
  var dot=pill.querySelector('.dot');
  pill.className='status-pill '+state;
  dot.className='dot'+(state==='loading'?' pulse':'');
  document.getElementById('status-text').textContent=txt;
}

import numpy as np
from scipy.spatial import KDTree
import json

def generate_synthetic(n_points=10000, n_classes=3, noise_frac=0.12, seed=42):
    rng = np.random.default_rng(seed)
    n_per = n_points // n_classes
    pts_list, lbl_list = [], []
    centers = rng.uniform(10, 90, (n_classes, 3))
    centers[:, 2] = 0
    for c, center in enumerate(centers):
        cluster = rng.normal(0, 12, (n_per, 3)) + center
        cluster[:, 2] = rng.exponential(2.0, n_per) + c * 4
        pts_list.append(cluster)
        lbl_list.append(np.full(n_per, c, dtype=np.int32))
    xyz = np.vstack(pts_list)
    true_labels = np.concatenate(lbl_list)
    tree = KDTree(xyz)
    _, nn_idx = tree.query(xyz, k=8)
    nn_lbl = true_labels[nn_idx[:, 1:]]
    boundary = (nn_lbl != true_labels[:, None]).any(axis=1)
    n_noise = int(n_points * noise_frac)
    b_idx = np.where(boundary)[0]
    i_idx = np.where(~boundary)[0]
    nb = min(int(n_noise * 0.7), len(b_idx))
    ni = min(n_noise - nb, len(i_idx))
    chosen = np.concatenate([rng.choice(b_idx, nb, replace=False), rng.choice(i_idx, ni, replace=False)])
    pred_labels = true_labels.copy()
    for idx in chosen:
        others = [c for c in range(n_classes) if c != pred_labels[idx]]
        pred_labels[idx] = rng.choice(others)
    return xyz.astype(np.float64), true_labels, pred_labels

def run_eval(xyz, true_labels, pred_labels, n_classes):
    N = len(xyz)
    cm = np.zeros((n_classes, n_classes), dtype=np.int64)
    for t in range(n_classes):
        for p in range(n_classes):
            cm[t, p] = int(((true_labels == t) & (pred_labels == p)).sum())
    iou = []
    for c in range(n_classes):
        tp = cm[c, c]; fp = cm[:, c].sum() - tp; fn = cm[c, :].sum() - tp
        d = tp + fp + fn
        iou.append(float(tp) / d if d > 0 else 0.0)
    miou = float(np.mean(iou))
    accuracy = float(cm.diagonal().sum()) / max(1, int(cm.sum()))
    class_trees = {}
    for c in range(n_classes):
        m = true_labels == c
        if m.sum() > 0:
            class_trees[c] = KDTree(xyz[m])
    dw = np.zeros((n_classes, n_classes), dtype=np.float64)
    wrong = true_labels != pred_labels
    if wrong.sum() > 0:
        wx, wt, wp = xyz[wrong], true_labels[wrong], pred_labels[wrong]
        for c in range(n_classes):
            cm_ = wt == c
            if not cm_.any(): continue
            tree = class_trees.get(c)
            if tree is None: continue
            k = min(2, tree.n)
            dk, _ = tree.query(wx[cm_], k=k)
            dk = np.asarray(dk, dtype=np.float64)
            if k == 1: dists = dk.ravel()
            else:
                c0, c1 = dk[:, 0], dk[:, 1]
                dists = np.where(c0 < 1e-9, c1, c0)
            cp = wp[cm_]
            for p in range(n_classes):
                if p == c: continue
                pm = cp == p
                if pm.any(): dw[c, p] += dists[pm].sum()
    mde = [float(dw[c].sum()) / max(1, int((true_labels == c).sum())) for c in range(n_classes)]
    mmde = float(np.mean(mde))
    k_nn = min(10, N - 1)
    tree_all = KDTree(xyz)
    _, nn_idx = tree_all.query(xyz, k=k_nn + 1)
    nn_lbl = true_labels[nn_idx[:, 1:]]
    is_boundary = (nn_lbl != true_labels[:, None]).any(axis=1)
    bxyz = xyz[is_boundary]
    d2b = np.zeros(N, dtype=np.float64)
    if bxyz.shape[0] > 0:
        bt = KDTree(bxyz)
        d2b = np.asarray(bt.query(xyz)[0], dtype=np.float64)
    scale = float(np.ptp(xyz, axis=0).max())
    thresholds = [0, scale*0.02, scale*0.05, scale*0.12, float('inf')]
    band_labels = ['0-2%', '2-5%', '5-12%', '>12%']
    band_miou, band_counts = [], []
    for lo, hi in zip(thresholds[:-1], thresholds[1:]):
        m = (d2b >= lo) & (d2b < hi)
        cnt = int(m.sum())
        band_counts.append(cnt)
        if cnt < 10: band_miou.append(None); continue
        bcm = np.zeros((n_classes, n_classes), dtype=np.int64)
        for t in range(n_classes):
            for p in range(n_classes):
                bcm[t, p] = int(((true_labels[m] == t) & (pred_labels[m] == p)).sum())
        bious = []
        for c in range(n_classes):
            tp = bcm[c, c]; fp = bcm[:, c].sum() - tp; fn = bcm[c, :].sum() - tp
            d = tp + fp + fn
            bious.append(float(tp) / d if d > 0 else 0.0)
        band_miou.append(float(np.mean(bious)))
    hard_pct = float((wrong & is_boundary).sum()) / max(1, int(wrong.sum())) * 100
    return json.dumps({'cm': cm.tolist(), 'dw': dw.tolist(), 'iou': iou, 'miou': miou,
        'accuracy': accuracy, 'mde': mde, 'mmde': mmde, 'band_labels': band_labels,
        'band_miou': band_miou, 'band_counts': band_counts, 'hard_pct': hard_pct,
        'n_points': N, 'n_wrong': int(wrong.sum())})
`;

async function initPyodide(){
  setStatus('loading','Loading Pyodide…');
  try{
    pyodide=await loadPyodide();
    setStatus('loading','Installing numpy + scipy…');
    await pyodide.loadPackage(['numpy','scipy']);
    await pyodide.runPythonAsync(METRIC_PY);
    setStatus('ready','Ready — click Run evaluation');
    document.getElementById('run-btn').disabled=false;
  }catch(e){setStatus('error','Failed: '+e.message);console.error(e);}
}

async function runEval(){
  if(!pyodide)return;
  var btn=document.getElementById('run-btn');
  btn.disabled=true;
  setStatus('loading','Running…');
  try{
    var result;
    if(mode==='demo'){
      var nPts=parseInt(document.getElementById('n-points').value);
      var nCls=parseInt(document.getElementById('n-classes').value);
      var noise=parseInt(document.getElementById('noise-frac').value)/100;
      pyodide.globals.set('_n_pts',nPts);
      pyodide.globals.set('_n_cls',nCls);
      pyodide.globals.set('_noise',noise);
      result=await pyodide.runPythonAsync('xyz,tl,pl=generate_synthetic(_n_pts,_n_cls,_noise)\nrun_eval(xyz,tl,pl,_n_cls)');
    }else{
      if(!uploadedData){setStatus('error','No CSV uploaded');btn.disabled=false;return;}
      var d=uploadedData;
      var labels=Array.from(new Set(d.tl)).sort(function(a,b){return a-b});
      var nCls=labels.length;
      pyodide.globals.set('_xs',d.x);pyodide.globals.set('_ys',d.y);
      pyodide.globals.set('_zs',d.z);pyodide.globals.set('_tl',d.tl);
      pyodide.globals.set('_pl',d.pl);pyodide.globals.set('_n_cls',nCls);
      result=await pyodide.runPythonAsync('import numpy as np\nxyz=np.column_stack([_xs,_ys,_zs])\ntl=np.array(_tl,dtype=np.int32)\npl=np.array(_pl,dtype=np.int32)\nrun_eval(xyz,tl,pl,_n_cls)');
    }
    var data=JSON.parse(result);
    var namesRaw=mode==='demo'?document.getElementById('class-names').value:document.getElementById('upload-class-names').value;
    var names=namesRaw.split(',').map(function(s){return s.trim()}).filter(Boolean);
    while(names.length<data.cm.length)names.push('Class '+names.length);
    renderResults(data,names);
    setStatus('ready','Done — '+data.n_points.toLocaleString()+' pts, '+data.n_wrong.toLocaleString()+' misclassified');
  }catch(e){setStatus('error','Error: '+e.message);console.error(e);}
  btn.disabled=false;
}

function renderResults(d,names){
  document.getElementById('placeholder').hidden=true;
  document.getElementById('results-content').hidden=false;
  document.getElementById('m-miou').textContent=(d.miou*100).toFixed(1)+'%';
  document.getElementById('m-mmde').textContent=d.mmde.toFixed(3);
  document.getElementById('m-acc').textContent=(d.accuracy*100).toFixed(1)+'%';
  document.getElementById('m-hard').textContent=d.hard_pct.toFixed(1)+'%';
  renderCM(d.cm,names,'cm-canvas',false);
  renderCM(d.dw,names,'dw-canvas',true);
  renderMDE(d.mde,names);
  renderStrat(d.band_labels,d.band_miou,d.band_counts);
  renderCode(d,names);
  var leg=document.getElementById('cm-legend');
  leg.innerHTML=names.map(function(n,i){
    return '<span class="cm-pill" style="background:'+CLASS_SOFT[i%CLASS_SOFT.length]+';border-color:'+CLASS_COLORS[i%CLASS_COLORS.length]+';color:'+CLASS_COLORS[i%CLASS_COLORS.length]+'"><span style="width:7px;height:7px;border-radius:50%;background:'+CLASS_COLORS[i%CLASS_COLORS.length]+';display:inline-block"></span>'+n+'</span>';
  }).join('');
}

function renderCM(matrix,names,id,weighted){
  var n=matrix.length;
  var cell=Math.min(56,Math.floor(220/n)),pad=72;
  var w=pad+n*cell,h=pad+n*cell;
  var canvas=document.getElementById(id);
  canvas.width=w;canvas.height=h;
  var ctx=canvas.getContext('2d');
  var flat=matrix.reduce(function(a,r){return a.concat(r)},[]);
  var maxVal=Math.max.apply(null,flat.concat([1]));
  ctx.font='11px Arial,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  for(var t=0;t<n;t++){
    for(var p=0;p<n;p++){
      var val=matrix[t][p];
      var intensity=val/maxVal;
      var base=t===p?[23,107,77]:[159,47,54];
      var r=Math.round(255-(255-base[0])*intensity);
      var g=Math.round(255-(255-base[1])*intensity);
      var b=Math.round(255-(255-base[2])*intensity);
      ctx.fillStyle='rgb('+r+','+g+','+b+')';
      ctx.fillRect(pad+p*cell,pad+t*cell,cell-2,cell-2);
      ctx.fillStyle=intensity>0.45?'#fff':'#17211c';
      var lbl=weighted?(val>=1000?(val/1000).toFixed(1)+'k':val.toFixed(1)):val.toLocaleString();
      ctx.fillText(lbl,pad+p*cell+cell/2-1,pad+t*cell+cell/2);
    }
  }
  ctx.fillStyle='#56635d';ctx.font='bold 10px Arial,sans-serif';
  for(var i=0;i<n;i++){
    var short=names[i].length>8?names[i].slice(0,7)+'…':names[i];
    ctx.save();ctx.translate(pad+i*cell+cell/2,pad-10);ctx.fillText(short,0,0);ctx.restore();
    ctx.save();ctx.translate(pad-8,pad+i*cell+cell/2);ctx.rotate(-Math.PI/2);ctx.fillText(short,0,0);ctx.restore();
  }
  ctx.fillStyle='#56635d';ctx.font='10px Arial,sans-serif';
  ctx.save();ctx.translate(8,pad+n*cell/2);ctx.rotate(-Math.PI/2);ctx.fillText('True',0,0);ctx.restore();
  ctx.fillText('Predicted',pad+n*cell/2,pad-26);
}

function renderMDE(mde,names){
  if(mdeChart)mdeChart.destroy();
  var ctx=document.getElementById('mde-chart').getContext('2d');
  mdeChart=new Chart(ctx,{type:'bar',data:{labels:names.slice(0,mde.length),datasets:[{label:'MDE',data:mde.map(function(v){return parseFloat(v.toFixed(4))}),backgroundColor:names.map(function(_,i){return CLASS_SOFT[i%CLASS_SOFT.length]}),borderColor:names.map(function(_,i){return CLASS_COLORS[i%CLASS_COLORS.length]}),borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#e9f0ec'},ticks:{font:{size:11},color:'#56635d'}},x:{grid:{display:false},ticks:{font:{size:11},color:'#56635d'}}}}});
}

function renderStrat(labels,miou,counts){
  if(stratChart)stratChart.destroy();
  var ctx=document.getElementById('strat-chart').getContext('2d');
  var vals=miou.map(function(v){return v===null?null:parseFloat((v*100).toFixed(2))});
  stratChart=new Chart(ctx,{type:'bar',data:{labels:labels.map(function(l,i){return l+' ('+counts[i].toLocaleString()+' pts)'}),datasets:[{label:'mIoU (%)',data:vals,backgroundColor:['#f0aab0','#f5d79e','#a8d9c0','#dff2e8'],borderColor:['#9f2f36','#a45f00','#176b4d','#0f4c39'],borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return 'mIoU: '+(c.parsed.y!=null?c.parsed.y.toFixed(1)+'%':'n/a')}}}},scales:{y:{beginAtZero:true,max:100,ticks:{callback:function(v){return v+'%'},font:{size:11},color:'#56635d'},grid:{color:'#e9f0ec'}},x:{grid:{display:false},ticks:{font:{size:11},color:'#56635d'}}}}});
}

function renderCode(d,names){
  var nms=names.slice(0,d.cm.length).map(function(n){return '"'+n+'"'}).join(', ');
  document.getElementById('code-snippet').textContent='from aerial_lidar_spatial_eval import SpatialEvaluator\n\nev = SpatialEvaluator(\n    n_classes='+d.cm.length+',\n    class_names=['+nms+'],\n)\nresult = ev.evaluate(xyz, true_labels, pred_labels)\n\n# mIoU:     '+(d.miou*100).toFixed(1)+'%\n# Accuracy: '+(d.accuracy*100).toFixed(1)+'%\n# mMDE:     '+d.mmde.toFixed(3)+' units\nprint(result.summary())';
}

initPyodide();
</script>
